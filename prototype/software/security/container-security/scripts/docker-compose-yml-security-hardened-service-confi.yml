# docker-compose.yml -- security-hardened configuration
version: "3.9"

services:
  api:
    image: myapp:1.0.0  # Pinned version, never :latest
    build:
      context: .
      dockerfile: Dockerfile
    user: "1001:1001"    # Non-root UID:GID
    read_only: true      # Read-only filesystem
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL              # Drop all capabilities
    cap_add:
      - NET_BIND_SERVICE # Add back only what's needed
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
          pids: 100
    networks:
      - backend
    secrets:
      - db_password
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  db:
    image: postgres:16.2-alpine
    user: "999:999"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid
      - /run/postgresql:rw
    volumes:
      - db-data:/var/lib/postgresql/data:rw
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
    secrets:
      - db_password
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password

networks:
  backend:
    driver: bridge
    internal: true  # No external access

secrets:
  db_password:
    file: ./secrets/db_password.txt

volumes:
  db-data:
    driver: local
