# kong.yml — declarative gateway config (DB-less mode)
# Input:  Incoming HTTP requests to gateway port 8000
# Output: Routed requests to upstream services with auth + rate limiting
_format_version: "3.0"

services:
  - name: user-service
    url: http://user-service:8001
    routes:
      - name: user-route
        paths:
          - /api/v1/users
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local

  - name: order-service
    url: http://order-service:8002
    routes:
      - name: order-route
        paths:
          - /api/v1/orders
        strip_path: false

plugins:
  - name: jwt
    config:
      claims_to_verify:
        - exp
  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid
  - name: prometheus
