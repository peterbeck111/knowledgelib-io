# Input:  Traefik v3.6 static config file
# Output: Fully configured Traefik instance

api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: proxy

certificatesResolvers:
  le:
    acme:
      email: admin@example.com
      storage: /acme.json
      httpChallenge:
        entryPoint: web

log:
  level: WARN

accessLog:
  format: json
  filters:
    statusCodes:
      - "400-499"
      - "500-599"

metrics:
  prometheus:
    entryPoint: websecure
