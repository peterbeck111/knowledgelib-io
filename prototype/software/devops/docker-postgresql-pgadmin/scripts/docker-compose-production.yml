# docker-compose-production.yml -- Uses Docker secrets, no plain text passwords
# Requires: mkdir -p secrets
#           echo "your_secure_password" > ./secrets/postgres_password
#           echo "admin@example.com" > ./secrets/pgadmin_email
#           echo "your_pgadmin_password" > ./secrets/pgadmin_password
#           chmod 600 ./secrets/*
#           echo "*.secrets" >> .gitignore

services:
  postgres:
    image: postgres:17
    container_name: pg-db-prod
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      POSTGRES_DB: appdb
      POSTGRES_INITDB_ARGS: "--data-checksums --auth-host=scram-sha-256"
    secrets:
      - pg_password
    ports:
      - "127.0.0.1:5432:5432"          # Bind to localhost only
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    networks:
      - pg-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pg-admin-prod
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL_FILE: /run/secrets/pgadmin_email
      PGADMIN_DEFAULT_PASSWORD_FILE: /run/secrets/pgadmin_password
      PGADMIN_LISTEN_PORT: 80
      PGADMIN_DISABLE_POSTFIX: "true"
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      PGADMIN_CONFIG_LOGIN_BANNER: '"Authorized access only"'
    secrets:
      - pgadmin_email
      - pgadmin_password
    ports:
      - "127.0.0.1:5050:80"            # Bind to localhost only
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pg-network

secrets:
  pg_password:
    file: ./secrets/postgres_password
  pgadmin_email:
    file: ./secrets/pgadmin_email
  pgadmin_password:
    file: ./secrets/pgadmin_password

volumes:
  pgdata:
    driver: local
  pgadmin_data:
    driver: local

networks:
  pg-network:
    driver: bridge
