# Docker Compose: Redis Cluster (3 Masters + 3 Replicas)
# Source: knowledgelib.io -- AI Knowledge Library (verified 2026-02-27)
# Usage:
#   1. docker compose -f docker-compose-cluster.yml up -d
#   2. docker exec redis-node-1 redis-cli --cluster create \
#        redis-node-1:6379 redis-node-2:6379 redis-node-3:6379 \
#        redis-node-4:6379 redis-node-5:6379 redis-node-6:6379 \
#        --cluster-replicas 1 --cluster-yes
# Requires: redis-cluster.conf in the same directory

services:
  redis-node-1:
    image: redis:7.4-alpine
    container_name: redis-node-1
    ports:
      - "6371:6379"
      - "16371:16379"
    volumes:
      - ./redis-cluster.conf:/usr/local/etc/redis/redis.conf
      - node1-data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - redis-cluster

  redis-node-2:
