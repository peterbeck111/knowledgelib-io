# docker-compose-production.yml -- Production-hardened SonarQube with PostgreSQL
# Usage: docker compose -f docker-compose-production.yml up -d
#
# Prerequisites:
#   - Docker Engine 20.10+
#   - Host: sysctl -w vm.max_map_count=524288 && sysctl -w fs.file-max=131072
#   - Create .env file with SONAR_DB_PASSWORD, SONAR_ADMIN_PASSWORD
#
# Input:  .env file with credentials, host with tuned kernel params
# Output: Production SonarQube instance at http://localhost:9000

services:
  sonarqube:
    image: sonarqube:developer  # or :community, :enterprise
    hostname: sonarqube
    read_only: true
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD}
      SONAR_WEB_JAVAOPTS: "-Xmx2g -Xms512m"
      SONAR_CE_JAVAOPTS: "-Xmx2g -Xms512m"
      SONAR_SEARCH_JAVAOPTS: "-Xmx1g -Xms512m"
    deploy:
      resources:
        limits:
          memory: 6g
          cpus: "2.0"
        reservations:
          memory: 3g
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_temp:/opt/sonarqube/temp
    tmpfs:
      - /tmp:size=256m
    ports:
      - "9000:9000"
    networks:
      - sonarnet
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:17
    hostname: postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD}
      POSTGRES_DB: sonar
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sonarnet
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_temp:
  postgresql_data:

networks:
  sonarnet:
    driver: bridge
