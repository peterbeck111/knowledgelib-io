# Input:  Running PostgreSQL StatefulSet with headless Service postgres-hl
# Output: Daily pg_dump backup to a PVC at /backup/YYYYMMDD.dump
# Usage:  kubectl apply -f postgres-backup-cronjob.yaml

apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
spec:
  schedule: "0 2 * * *"          # Daily at 2 AM UTC
  concurrencyPolicy: Forbid       # Don't run concurrent backups
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              command: ['sh', '-c']
              args:
                - |
                  BACKUP_FILE="/backup/$(date +%Y%m%d_%H%M%S).dump"
                  echo "Starting backup to $BACKUP_FILE"
                  pg_dump -h postgres-0.postgres-hl \
                          -U postgres \
                          -Fc \
                          appdb > "$BACKUP_FILE"
                  echo "Backup complete: $(ls -lh $BACKUP_FILE)"
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_PASSWORD
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: postgres-backup-pvc
