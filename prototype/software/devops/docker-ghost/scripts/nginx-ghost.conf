# Nginx reverse proxy configuration for Ghost CMS
# Place at: /etc/nginx/conf.d/ghost.conf (or mount via Docker volume)
# Requires: SSL certificates from Certbot at /etc/letsencrypt/live/blog.example.com/

server {
    listen 80;
    server_name blog.example.com www.blog.example.com;
    return 301 https://blog.example.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name blog.example.com;

    ssl_certificate     /etc/letsencrypt/live/blog.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50m;

    location / {
        proxy_pass http://ghost:2368;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
